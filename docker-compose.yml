version: '3.9'

services:
  db:
    image: postgres:15
    container_name: sec_sentiment_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sec_user
      POSTGRES_PASSWORD: sec_password
      POSTGRES_DB: sec_sentiment
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: sec_sentiment_api
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  pgdata: